<!--
====================================================================
  TEARS OF THE ETERNAL  v1.0  —  Single-file HTML5 Isaac-like
====================================================================
HOW TO EXTEND:
  Items   → Push into ITEM_DB (fields: id,name,desc,col,passive,active)
  Enemies → Push into ENEMY_DB (fields: id,name,hp,spd,dmg,col,sz,ai)
  DLC     → Follow DLC_REPENTANCE_ECHO pattern; call pack.register()
  Floors  → Push theme into CFG.THEMES; update CFG.HP_SCALE array
  Synergy → Add checks in Player.computeFlags() for pairs of item IDs

ARCHITECTURE (top-to-bottom in this file):
  CFG → AU → IN → Vec2/RNG/aabb → PARTICLES
  → ITEM_DB → ENEMY_DB → FLOOR_GEN
  → Tear / Player / Enemy / Pickup / Familiar / Room
  → GameState → Renderer → Menus → Main loop → Init
====================================================================
-->

const AU=(()=>{
  let ax=null;
  const init=()=>{if(!ax)ax=new(window.AudioContext||window.webkitAudioContext)();};
  const tone=(f,type,dur,vol,fe=null)=>{
    if(!ax)return;
    try{
      const o=ax.createOscillator(),g=ax.createGain();
      o.type=type;o.frequency.value=f;
      if(fe)o.frequency.exponentialRampToValueAtTime(fe,ax.currentTime+dur);
      g.gain.setValueAtTime(vol,ax.currentTime);
      g.gain.linearRampToValueAtTime(0,ax.currentTime+dur);
      o.connect(g);g.connect(ax.destination);o.start();o.stop(ax.currentTime+dur);
    }catch(e){}
  };
  const nz=(dur,vol)=>{
    if(!ax)return;
    try{
      const b=ax.createBuffer(1,ax.sampleRate*dur|0,ax.sampleRate);
      const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
      const s=ax.createBufferSource(),g=ax.createGain();
      s.buffer=b;g.gain.setValueAtTime(vol,ax.currentTime);
      g.gain.linearRampToValueAtTime(0,ax.currentTime+dur);
      s.connect(g);g.connect(ax.destination);s.start();
    }catch(e){}
  };
  const v=CFG.VOL;
  let mT=null,mOn=true,mFloor=1,mNote=0,mScl=0;
  const SCLS=[[0,3,7,10],[0,2,5,7],[0,3,6,9],[0,4,7,11]];
  const startMusic=f=>{
    stopMusic();if(!mOn)return;mFloor=f;
    const roots=[55,58,52,50,53,48];
    const root=roots[Math.min(f-1,5)];
    mScl=(f-1)%SCLS.length;mNote=0;
    const tick=()=>{
      if(!mOn||!ax)return;
      const sc=SCLS[mScl],n=root+sc[mNote%sc.length];
      const fr=27.5*Math.pow(2,n/12);
      tone(fr,'triangle',0.28,0.04);
      if(mNote%4===0)tone(fr/2,'sine',0.48,0.03);
      mNote++;
    };
    tick();mT=setInterval(tick,390);
  };
  const stopMusic=()=>{if(mT){clearInterval(mT);mT=null;}};
  return{
    init,startMusic,stopMusic,
    get musicOn(){return mOn;},
    toggleMusic(){mOn=!mOn;if(!mOn)stopMusic();else startMusic(mFloor);},
    shoot:   ()=>tone(900,'square',0.07,0.05,440),
    brimShot:()=>tone(100,'sawtooth',0.4,0.09,60),
    hit:     ()=>tone(240,'sawtooth',0.09,0.07,110),
    hurt:    ()=>{tone(160,'sawtooth',0.2,0.1,70);nz(0.14,0.06);},
    die:     ()=>{tone(100,'sawtooth',0.42,0.1,32);nz(0.32,0.08);},
    pickup:  ()=>{[0,4,7,12].forEach((n,i)=>setTimeout(()=>tone(440*Math.pow(2,n/12),'sine',0.15,0.09),i*75));},
    door:    ()=>tone(320,'square',0.12,0.06,180),
    boss:    ()=>{tone(50,'sawtooth',0.7,0.14,25);nz(0.55,0.13);},
    explode: ()=>{tone(150,'sawtooth',0.3,0.12,42);nz(0.24,0.1);},
    levelup: ()=>{[0,7,12,19].forEach((n,i)=>setTimeout(()=>tone(330*Math.pow(2,n/12),'sine',0.22,0.1),i*95));},
    victory: ()=>{[0,4,7,12,16,19].forEach((n,i)=>setTimeout(()=>tone(262*Math.pow(2,n/12),'triangle',0.34,0.12),i*115));},
    sword:   ()=>tone(600,'sawtooth',0.15,0.08,200),
    knife:   ()=>tone(700,'square',0.1,0.07,500),
  };
})();

class Vec2{
  constructor(x=0,y=0){this.x=x;this.y=y;}
  add(v){return new Vec2(this.x+v.x,this.y+v.y);}
  sub(v){return new Vec2(this.x-v.x,this.y-v.y);}
  scale(s){return new Vec2(this.x*s,this.y*s);}
  len(){return Math.sqrt(this.x*this.x+this.y*this.y);}
  norm(){const l=this.len()||1;return new Vec2(this.x/l,this.y/l);}
  static dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
  static fromAngle(a,l=1){return new Vec2(Math.cos(a)*l,Math.sin(a)*l);}
}
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const RNG=(()=>{
  let s=Date.now()>>>0;
  const nx=()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/4294967295;};
  return{
    seed:(n)=>{s=n>>>0;},
    rand:nx,
    ri:(a,b)=>Math.floor(nx()*(b-a+1)+a),
    rf:(a,b)=>nx()*(b-a)+a,
    choice:(arr)=>arr[Math.floor(nx()*arr.length)],
    shuffle:(a)=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(nx()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;},
  };
})();
const aabb=(ax,ay,aw,ah,bx,by,bw,bh)=>ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
const circRect=(cx,cy,cr,rx,ry,rw,rh)=>{
  const nx=clamp(cx,rx,rx+rw),ny=clamp(cy,ry,ry+rh);
  return Math.hypot(cx-nx,cy-ny)<cr;
};
const SHAKE={mag:0};
const addShake=m=>{SHAKE.mag=Math.max(SHAKE.mag,m);};
const POOL=[];
for(let i=0;i<700;i++)POOL.push({life:0,maxL:1,x:0,y:0,vx:0,vy:0,r:3,col:'#fff',grav:0,sq:false});
const spawnParts=(x,y,n,o={})=>{
  let c=0;
  for(const p of POOL){
    if(p.life>0||c>=n)continue;
    const spread=o.spread??Math.PI*2;
    const baseDir=o.dir??Math.random()*Math.PI*2;
    const a=baseDir+(Math.random()-.5)*spread;
    const sp=o.spd??(1+Math.random()*3);
    p.x=x;p.y=y;
    p.vx=Math.cos(a)*sp*(o.mx??1);
    p.vy=Math.sin(a)*sp-(o.lift??0);
    p.life=o.life??30;p.maxL=p.life;
    p.r=o.r??3;p.col=o.col??'#e74c3c';
    p.grav=o.grav??0.1;p.sq=!!o.sq;
    c++;
  }
};
const updateParts=()=>{
  for(const p of POOL){
    if(p.life<=0)continue;
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=0.90;p.life--;
  }
};
const drawParts=(ctx)=>{
  for(const p of POOL){
    if(p.life<=0)continue;
    const a=p.life/p.maxL;
    const sz=Math.max(0.5,p.r*a);
    ctx.globalAlpha=a;ctx.fillStyle=p.col;
    if(p.sq){ctx.fillRect(p.x-sz,p.y-sz,sz*2,sz*2);}
    else{ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);ctx.fill();}
    if(p.r>=3&&!p.sq&&a>0.2){
      ctx.save();ctx.globalCompositeOperation='lighter';
      ctx.globalAlpha=a*0.25;
      const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,sz*2.5);
      g.addColorStop(0,p.col);g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,sz*2.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
  ctx.globalAlpha=1;
};
const bloodFx=(x,y,n=8,col='#c0392b')=>

const sparkFx=(x,y,col='#ffe066',n=6)=>

const pickupFx=(x,y)=>

const explosionFx=(x,y)=>{
  spawnParts(x,y,22,{col:'#e67e22',r:6,life:34,grav:0.12,spd:6,lift:2});
  spawnParts(x,y,12,{col:'#f1c40f',r:4,life:22,grav:0,spd:4});
  spawnParts(x,y,8, {col:'#fff',   r:3,life:12,grav:0,spd:7});
  smokeFx(x,y,16);
  addShake(9);
  _flashRings.push({x,y,r:4,maxR:70,life:12,maxLife:12,col:'#f39c12'});
};
const _flashRings=[];
const updateFlashRings=()=>{
  for(let i=_flashRings.length-1;i>=0;i--){
    const f=_flashRings[i];f.r+=( f.maxR-f.r)*0.35;f.life--;
    if(f.life<=0)_flashRings.splice(i,1);
  }
};
const drawFlashRings=(ctx)=>{
  for(const f of _flashRings){
    const a=(f.life/f.maxLife)*0.6;
    ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=a;
    ctx.strokeStyle=f.col;ctx.lineWidth=4*(f.life/f.maxLife);
    ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }
};
const STOMP_WARNINGS=[];
const updateStompWarnings=()=>{
  for(let i=STOMP_WARNINGS.length-1;i>=0;i--){
    const w=STOMP_WARNINGS[i];
    if(!w.exploded)w.life--;
    else{w._fadeTicks=(w._fadeTicks||0)+1;if(w._fadeTicks>12)STOMP_WARNINGS.splice(i,1);}
  }
};
const drawStompWarnings=(ctx)=>{
  const now=Date.now();
  for(const w of STOMP_WARNINGS){
    if(w.exploded)continue;
    const t=w.life/w.maxLife;            
    const pulse=0.5+0.5*Math.sin(now/60);
    const r=36+20*(1-t);                 
    ctx.save();
    ctx.globalAlpha=(0.08+0.10*pulse)*t;
    ctx.fillStyle='#e74c3c';
    ctx.beginPath();ctx.arc(w.x,w.y,r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=(0.5+0.4*pulse)*t;
    ctx.strokeStyle='#ff2222';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(w.x,w.y,r,0,Math.PI*2);ctx.stroke();
    const r2=r*0.55;
    ctx.globalAlpha=0.6*t;
    ctx.strokeStyle='#ff8888';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(w.x,w.y,r2,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=(0.7+0.3*pulse)*t;
    ctx.strokeStyle='#ff4444';ctx.lineWidth=1.5;
    ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(w.x-r,w.y);ctx.lineTo(w.x+r,w.y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(w.x,w.y-r);ctx.lineTo(w.x,w.y+r);ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
};
const tearTrail=(x,y,col)=>
  spawnParts(x,y,2,{col,r:2,life:10,grav:0,spd:0.5,spread:Math.PI*2});
function glowAt(ctx,x,y,r,col,a=0.35){
  ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=a;
  const g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,col);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function teardropPath(ctx,x,y,r,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle-Math.PI/2);
  ctx.beginPath();
  ctx.arc(0,0,r,Math.PI,0);                          
  ctx.bezierCurveTo(r,r*0.5,r*0.25,r*1.9,0,r*2.1);  
  ctx.bezierCurveTo(-r*0.25,r*1.9,-r,r*0.5,-r,0);    
  ctx.closePath();
  ctx.restore();
}
function heartPath(ctx,cx,cy,hw,hh){
  const x=cx-hw,y=cy-hh*0.5,w=hw*2,h=hh*1.5;
  const r=w*0.25;
  ctx.beginPath();
  ctx.moveTo(x+w/2,y+h);
  ctx.bezierCurveTo(x-w*0.1,y+h*0.6,x-w*0.15,y+r*0.5,x+r,y+r*0.5);
  ctx.arc(x+r+r,y+r,r,-Math.PI,-0,false);
  ctx.arc(x+w-r-r,y+r,r,-Math.PI,0,false);
  ctx.bezierCurveTo(x+w+w*0.15,y+r*0.5,x+w*1.1,y+h*0.6,x+w/2,y+h);
  ctx.closePath();
}

function choosePath(P,pathIdx){
  if(!P.paths)P.paths=[];
  const existing=P.paths.find(p=>p.pathIdx===pathIdx);
  if(existing){
    const nextLevel=existing.level;
    if(nextLevel<UPGRADE_PATHS[pathIdx].levels.length){
      UPGRADE_PATHS[pathIdx].levels[nextLevel].apply(P);
      existing.level++;
      computePlayerFlags(P);
    }
    return;
  }
  const lvl=UPGRADE_PATHS[pathIdx].levels[0];
  lvl.apply(P);
  P.paths.push({pathIdx,level:1});
  computePlayerFlags(P);
}
function advancePaths(P){
  if(!P.paths)return;
  P.paths.forEach(entry=>{
    const path=UPGRADE_PATHS[entry.pathIdx];
    if(entry.level<path.levels.length){
      path.levels[entry.level].apply(P);
      entry.level++;
    }
  });
  computePlayerFlags(P);
}
function drawPathMenu(ctx,G){
  const menu=G._pathMenu;if(!menu)return;
  const now=Date.now();
  const W=CFG.W,H=CFG.H;
  ctx.fillStyle='rgba(0,0,0,0.82)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 16px monospace';ctx.textAlign='center';
  ctx.fillText('⟡  POWER ASCENSION  ⟡',W/2,CFG.HUD_H+36);
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='11px monospace';
  ctx.fillText('Choose your path — it will evolve as you grow stronger',W/2,CFG.HUD_H+54);
  const paths=menu.paths;
  const cw=168,ch=220,gap=20;
  const totalW=paths.length*(cw+gap)-gap;
  const startX=W/2-totalW/2;
  const topY=CFG.HUD_H+70;
  for(let i=0;i<paths.length;i++){
    const pi=paths[i];
    const path=UPGRADE_PATHS[pi];
    const px=startX+i*(cw+gap);
    const py=topY;
    const sel=menu.hoveredIdx===i;
    const pulse=0.7+0.3*Math.sin(now/400+i*1.3);
    ctx.save();
    ctx.globalAlpha=sel?0.95:0.75;
    ctx.fillStyle=sel?path.col:'#0a0a14';
    ctx.beginPath();ctx.roundRect?ctx.roundRect(px,py,cw,ch,10):ctx.rect(px,py,cw,ch);ctx.fill();
    ctx.globalAlpha=pulse*(sel?1:0.5);
    ctx.strokeStyle=path.col;ctx.lineWidth=sel?3:1.5;
    ctx.beginPath();ctx.roundRect?ctx.roundRect(px,py,cw,ch,10):ctx.rect(px,py,cw,ch);ctx.stroke();
    ctx.restore();
    ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.08*pulse;
    ctx.fillStyle=path.glowCol;
    ctx.beginPath();ctx.arc(px+cw/2,py+ch/2,cw*0.75,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.save();ctx.fillStyle=path.col;ctx.globalAlpha=0.9;
    ctx.beginPath();ctx.arc(px+22,py+22,14,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';ctx.globalAlpha=1;
    ctx.fillText((i+1),px+22,py+27);
    ctx.fillStyle=sel?'#fff':path.col;
    ctx.font='bold 22px monospace';ctx.fillText(path.icon,px+cw/2,py+54);
    ctx.font='bold 11px monospace';ctx.fillText(path.name,px+cw/2,py+72);
    ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='9px monospace';
    ctx.fillText(path.tagline,px+cw/2,py+86);
    path.levels.forEach((lv,li)=>{
      const lx=px+12,ly=py+102+li*28;
      const alreadyHave=G.player?.paths?.find(p=>p.pathIdx===pi)?.level>li;
      ctx.fillStyle=alreadyHave?path.col:'rgba(255,255,255,0.15)';
      ctx.beginPath();ctx.arc(lx+5,ly+6,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=li===0?'#fff':'rgba(255,255,255,0.55)';
      ctx.font=`${li===0?'bold ':''  }9px monospace`;ctx.textAlign='left';
      ctx.fillText(`L${li+1}: ${lv.name}`,lx+14,ly+10);
      ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='8px monospace';
      ctx.fillText(lv.desc,lx+14,ly+20);
    });
    ctx.restore();
  }
  ctx.textAlign='left';
}
function newEnemyTear(x,y,vx,vy,dmg,col,life=240){
  const spd=Math.hypot(vx,vy)||1;

}

const DIR4=[{dx:0,dy:-1,d:'n',opp:'s'},{dx:0,dy:1,d:'s',opp:'n'},

function generateFloor(floor,seed){
  RNG.seed(seed);

  const grid=Array.from({length:gh},()=>Array(gw).fill(null));
  const rooms=[];
  const sx=2,sy=2;
  grid[sy][sx]={gx:sx,gy:sy,type:'start'};
  rooms.push(grid[sy][sx]);
  let cx=sx,cy=sy;
  const target=RNG.ri(10,13);
  for(let step=0;step<target*6&&rooms.length<target;step++){
    const dir=RNG.choice(DIR4);
    const nx=cx+dir.dx,ny=cy+dir.dy;
    if(nx<0||nx>=gw||ny<0||ny>=gh)continue;
    if(!grid[ny][nx]){grid[ny][nx]={gx:nx,gy:ny,type:'normal'};rooms.push(grid[ny][nx]);}
    cx=nx;cy=ny;
  }
  let boss=null,maxD=0;
  for(const r of rooms){
    if(r.type==='start')continue;
    const d=Math.abs(r.gx-sx)+Math.abs(r.gy-sy);
    if(d>maxD){maxD=d;boss=r;}
  }
  if(boss)boss.type='boss';
  const normals=rooms.filter(r=>r.type==='normal');
  RNG.shuffle(normals);
  if(normals[0])normals[0].type='item';
  if(normals[1])normals[1].type='treasure';
  if(normals[2])normals[2].type='shop';
  outer:for(let gy=0;gy<gh;gy++)for(let gx=0;gx<gw;gx++){
    if(grid[gy][gx])continue;
    const adj=DIR4.filter(d=>{const nx=gx+d.dx,ny=gy+d.dy;return nx>=0&&nx<gw&&ny>=0&&ny<gh&&!!grid[ny][nx];});
    if(adj.length===1){grid[gy][gx]={gx,gy,type:'secret'};rooms.push(grid[gy][gx]);break outer;}
  }

      if(nx>=0&&nx<gw&&ny>=0&&ny<gh&&grid[ny][nx]){

  }
  for(const r of rooms)populateRoom(r,floor);

    dmg:P._effDmg*0.55,life:Math.round(P.range/18)+8,maxLife:Math.round(P.range/18)+8,
    r:P.flags.brimBomb?8:10,piercing:true,col:'#7fff00',
    homing:false,spectral:true,explosive:P.flags.brimBomb,
    bouncy:false,stain:false,split:false,dead:false,bounced:0,trail:[],isEnemy:false,isBrim:true,missile:false};
  P.tears.push(t);AU.brimShot();
}
function tileCollide(P,room){
  const hsz=Math.max(6,P.sz-2);
  const doorOpen=(tx,ty)=>{
    const n=CFG.DOOR_N,s=CFG.DOOR_S,w=CFG.DOOR_W,e=CFG.DOOR_E;
    if(ty===n.row&&n.cols.includes(tx))return !!room.doors.n?.open;
    if(ty===s.row&&s.cols.includes(tx))return !!room.doors.s?.open;
    if(tx===w.col&&w.rows.includes(ty))return !!room.doors.w?.open;
    if(tx===e.col&&e.rows.includes(ty))return !!room.doors.e?.open;
    return false;
  };
  const tileAt=(px,py)=>{
    const tx=Math.floor((px-CFG.RX)/CFG.TS),ty=Math.floor((py-CFG.RY)/CFG.TS);
    if(tx<0||tx>=CFG.RCOLS||ty<0||ty>=CFG.RROWS)return 0;
    const t=room.tiles[ty][tx];
    if((t===1||t===2)&&doorOpen(tx,ty))return 0; 
    return t;
  };
  const solid=t=>t===1||t===2;
  for(let iter=0;iter<2;iter++){
    if(solid(tileAt(P.x-hsz,P.y))||solid(tileAt(P.x-hsz,P.y-hsz))||solid(tileAt(P.x-hsz,P.y+hsz))){
      const tx=Math.floor((P.x-hsz-CFG.RX)/CFG.TS);P.x=CFG.RX+(tx+1)*CFG.TS+hsz;}
    if(solid(tileAt(P.x+hsz,P.y))||solid(tileAt(P.x+hsz,P.y-hsz))||solid(tileAt(P.x+hsz,P.y+hsz))){
      const tx=Math.floor((P.x+hsz-CFG.RX)/CFG.TS);P.x=CFG.RX+tx*CFG.TS-hsz;}
    if(solid(tileAt(P.x,P.y-hsz))||solid(tileAt(P.x-hsz,P.y-hsz))||solid(tileAt(P.x+hsz,P.y-hsz))){
      const ty=Math.floor((P.y-hsz-CFG.RY)/CFG.TS);P.y=CFG.RY+(ty+1)*CFG.TS+hsz;}
    if(solid(tileAt(P.x,P.y+hsz))||solid(tileAt(P.x-hsz,P.y+hsz))||solid(tileAt(P.x+hsz,P.y+hsz))){
      const ty=Math.floor((P.y+hsz-CFG.RY)/CFG.TS);P.y=CFG.RY+ty*CFG.TS-hsz;}
  }
}
function breakRocksNear(P,room){
  const tx=Math.floor((P.x-CFG.RX)/CFG.TS),ty=Math.floor((P.y-CFG.RY)/CFG.TS);
  for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const nx=tx+dx,ny=ty+dy;
    if(ny>=0&&ny<CFG.RROWS&&nx>=0&&nx<CFG.RCOLS&&room.tiles[ny][nx]===2){
      room.tiles[ny][nx]=0;smokeFx(CFG.RX+nx*CFG.TS+24,CFG.RY+ny*CFG.TS+24,4);}
  }
}
function checkSpikes(P,room,G){
  if(P.flags.flight)return;
  const tx=Math.floor((P.x-CFG.RX)/CFG.TS),ty=Math.floor((P.y-CFG.RY)/CFG.TS);

function checkDoorTransition(P,G){
  if(!G.room?.cleared)return;
  const mid=CFG.RX+CFG.RW/2;
  const vmid=CFG.RY+CFG.RH/2;
  const thresh=P.sz+6;
  const margins=[
    {d:'n',ok:P.y<CFG.PY1+thresh&&Math.abs(P.x-mid)<72},
    {d:'s',ok:P.y>CFG.PY2-thresh&&Math.abs(P.x-mid)<72},
    {d:'w',ok:P.x<CFG.PX1+thresh&&Math.abs(P.y-vmid)<72},
    {d:'e',ok:P.x>CFG.PX2-thresh&&Math.abs(P.y-vmid)<72},
  ];
  for(const{d,ok}of margins){

function updateTears(tears,P,room,G,isEnemy){
  for(let i=tears.length-1;i>=0;i--){
    const t=tears[i];
    if(t.dead){tears.splice(i,1);continue;}
    if(!isEnemy){t.trail.push({x:t.x,y:t.y});if(t.trail.length>7)t.trail.shift();}
    if(t.homing&&!isEnemy){
      let cl=null,cd=1e9;
      room.enemies.forEach(e=>{if(!e.dead){const d=Vec2.dist({x:t.x,y:t.y},{x:e.x,y:e.y});if(d<cd){cd=d;cl=e;}}});
      if(cl&&cd<200){
        const dx=cl.x-t.x,dy=cl.y-t.y,dd=Math.hypot(dx,dy)||1;
        const sp=Math.hypot(t.vx,t.vy);
        const tr=P?.flags?.brainWorm?0.28:0.08;
        t.vx=lerp(t.vx,dx/dd*sp,tr);t.vy=lerp(t.vy,dy/dd*sp,tr);
      }
    }
    if(t.missile&&!isEnemy){
      const dx=t.tx-t.x,dy=t.ty-t.y,dd=Math.hypot(dx,dy)||1;
      t.vx=lerp(t.vx,dx/dd*10,0.15);t.vy=lerp(t.vy,dy/dd*10,0.15);
      if(dd<24){tearBoom(t,room,G);t.dead=true;continue;}
    }
    if(P?.flags?.ipecac&&!isEnemy)t.vy+=0.12;
    t.x+=t.vx;t.y+=t.vy;
    t.life--;
    if(Math.random()<0.35&&!isEnemy)tearTrail(t.x,t.y,t.col||'#4fc3f7');
    const outX=t.x<CFG.PX1||t.x>CFG.PX2;
    const outY=t.y<CFG.PY1||t.y>CFG.PY2;
    if((outX||outY)&&!t.spectral){
      if(t.bouncy&&t.bounced<(P?.flags?.heavyBounce?3:1)){
        if(outX)t.vx*=-1;if(outY)t.vy*=-1;t.x+=t.vx;t.y+=t.vy;t.bounced++;
      } else {
        if(t.explosive||t.missile)tearBoom(t,room,G);else sparkFx(t.x,t.y,t.col||'#4fc3f7');
        t.dead=true;continue;
      }
    }
    if(!t.spectral){
      const rtx=Math.floor((t.x-CFG.RX)/CFG.TS),rty=Math.floor((t.y-CFG.RY)/CFG.TS);
      if(rty>=0&&rty<CFG.RROWS&&rtx>=0&&rtx<CFG.RCOLS&&room.tiles[rty][rtx]===2){
        if(t.explosive)tearBoom(t,room,G);else sparkFx(t.x,t.y,t.col||'#4fc3f7');
        t.dead=true;continue;
      }
    }
    if(t.life<=0){t.dead=true;continue;}
    if(!isEnemy){
      for(const e of room.enemies){
        if(e.dead)continue;
        const ch=!e.canHit||e.canHit(e,t);
        if(ch&&Vec2.dist({x:t.x,y:t.y},{x:e.x,y:e.y})<e.sz+t.r){
          hitEnemy(e,t.dmg,room,G);sparkFx(t.x,t.y,'#fff',4);
          if(t.explosive)tearBoom(t,room,G);
          if(t.split&&P)splitTear(t,P,room);
          if(!t.piercing){t.dead=true;break;}
        }
      }
    } else {
      if(!P||P.iframes>0)continue;
      if(Vec2.dist({x:t.x,y:t.y},{x:P.x,y:P.y})<P.sz+t.r){
        hurtPlayer(P,t.dmg*2,G,'enemy tear');t.dead=true;
      }
    }
  }
}
function tearBoom(t,room,G){

function splitTear(t,P,room){

function updateEnemy(e,P,room,G){

  e.ai(e,P,room,G);
  e.x+=e.vx;e.y+=e.vy;
  e.x=clamp(e.x,CFG.PX1+e.sz,CFG.PX2-e.sz);

function hitEnemy(e,dmg,room,G){
  if(e.dead)return;

  if(e.hp<=0)killEnemy(e,room,G);

function killEnemy(e,room,G){
  if(e.dead)return;e.dead=true;
  bloodFx(e.x,e.y,12);addShake(5);AU.die();
  if(G.player)G.player.score+=e.maxHp*2;
  G.kills=(G.kills||0)+1;
  if(e.onDeath)e.onDeath(e,room);
  room.enemies.forEach(en=>{if(!en.dead&&en.hp<=0)killEnemy(en,room,G);});
  if(Math.random()<0.14){
    room.pickups.push({x:e.x,y:e.y,type:'pickup',
      kind:RNG.choice(['red','coin','coin','bomb']),r:10,dead:false});
  }
  const living=room.enemies.filter(en=>!en.dead&&!en.isBoss);
  const bossLiving=room.enemies.filter(en=>!en.dead&&en.isBoss);
  if(living.length===0&&bossLiving.length===0){
    room.cleared=true;
    ['n','s','e','w'].forEach(d=>{if(room.doors[d])room.doors[d].open=true;});
    AU.door();addShake(4);
  }

function hurtPlayer(P,halfHearts,G,src){
  if(P.iframes>0)return;
  if(P.flags.unicorn>0)return;
  if(P.flags.mantle&&!P.mantleHit){P.mantleHit=true;addShake(4);sparkFx(P.x,P.y,'#f1c40f',12);return;}
  if(P.flags.wafer)halfHearts=Math.max(1,Math.round(halfHearts/2));
  AU.hurt();addShake(9);
  const take=Math.min(P.black,halfHearts);P.black-=take;halfHearts-=take;
  if(halfHearts>0){const st=Math.min(P.soul,halfHearts);P.soul-=st;halfHearts-=st;}
  if(halfHearts>0)P.hp=Math.max(0,P.hp-halfHearts);
  P.iframes=60;G._lastDeathSrc=src||'unknown';
  if(P.hp<=0&&P.soul<=0&&P.black<=0){
    if(P.lives>0){P.lives--;P.hp=1;P.iframes=120;return;}
    if(P.flags.innerChild){P.flags.innerChild=false;P.hp=2;P.sz=12;P.iframes=120;explosionFx(P.x,P.y);return;}
    if(P.flags.spiritShackles){P.flags.spiritShackles=false;P.flags.ghost=true;P.hp=1;P.iframes=120;return;}

function collectPickup(P,pk,G){

  if(pk.cost>0)P.coins-=pk.cost;
  pk.dead=true;

    else if(k==='soul'){P.soul+=2;sparkFx(pk.x,pk.y,'#85c1e9');}

function enterRoom(G,room,fromDir){

          if(ty%3===0){ctx.beginPath();ctx.moveTo(wx,wy+ts);ctx.lineTo(wx+ts,wy+ts);ctx.stroke();}
          if(fn<3){ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(wx+4+rh%8,wy+8);ctx.lineTo(wx+rh%12,wy+ts-6);ctx.stroke();}
        } else if(ts2===4){
          const cent=(tx%2===0)!==(ty%2===0);

          ctx.fillRect(wx,wy,ts,ts);
          ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.5;
          ctx.beginPath();ctx.moveTo(wx+ts/2,wy);ctx.lineTo(wx+ts,wy+ts/2);ctx.lineTo(wx+ts/2,wy+ts);ctx.lineTo(wx,wy+ts/2);ctx.closePath();ctx.stroke();
          if(rh<2){ctx.fillStyle='rgba(0,0,0,0.08)';ctx.beginPath();ctx.arc(wx+ts/2,wy+ts/2,2,0,Math.PI*2);ctx.fill();}

          ctx.fillStyle=(brickPhase+ty)%2===0?'rgba(255,255,255,0.018)':'rgba(0,0,0,0.06)';
          ctx.fillRect(wx,wy,ts,ts);
          ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=0.75;
          ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+ts,wy);ctx.stroke();
          ctx.strokeStyle='rgba(0,0,0,0.12)';
          const vx=(wx+rowOff)%(ts*2);if(vx<ts){ctx.beginPath();ctx.moveTo(wx+(ts-vx),wy);ctx.lineTo(wx+(ts-vx),wy+ts);ctx.stroke();}
          if(fn<2){ctx.fillStyle='rgba(0,0,0,0.10)';ctx.fillRect(wx+2,wy+ts-3,ts-4,2);}
        } else {
          ctx.fillStyle=(tx+ty)%2===0?'rgba(255,255,255,0.01)':'rgba(0,0,0,0.04)';
          ctx.fillRect(wx,wy,ts,ts);
          ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=0.5;
          ctx.beginPath();ctx.rect(wx+1,wy+1,ts-2,ts-2);ctx.stroke();
          if(rh===0){
            ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;

          }
        }

  }

  vg.addColorStop(0,'rgba(0,0,0,0)');

    ctx.fillStyle='rgba(80,0,0,0.06)';ctx.fillRect(CFG.RX,CFG.RY,CFG.RW,CFG.RH);

  }

}
function drawDoors(ctx,room,th){
  const ts=CFG.TS;
  const defs=[
    {d:'n',tiles:CFG.DOOR_N.cols,row:CFG.DOOR_N.row,horiz:true},
    {d:'s',tiles:CFG.DOOR_S.cols,row:CFG.DOOR_S.row,horiz:true},
    {d:'w',tiles:CFG.DOOR_W.rows,col:CFG.DOOR_W.col,horiz:false},
    {d:'e',tiles:CFG.DOOR_E.rows,col:CFG.DOOR_E.col,horiz:false},
  ];
  for(const def of defs){
    const door=room.doors[def.d];
    if(!door)continue;
    const open=door.open;
    const col=open?th.accent:th.door;
    if(def.horiz){
      for(const tc of def.tiles){
        const wx=CFG.RX+tc*ts,wy=CFG.RY+def.row*ts;
        ctx.fillStyle=col;ctx.fillRect(wx,wy,ts,ts);
        if(!open){
          ctx.fillStyle='rgba(0,0,0,0.4)';
          ctx.fillRect(wx+4,wy+4,ts-8,ts-8);
        }
      }
    } else {
      for(const tr of def.tiles){
        const wy=CFG.RY+tr*ts,wx=CFG.RX+def.col*ts;
        ctx.fillStyle=col;ctx.fillRect(wx,wy,ts,ts);
        if(!open){ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(wx+4,wy+4,ts-8,ts-8);}
      }
    }
  }
}
function drawPickups(ctx,room,G){

    }
  }
  ctx.textAlign='left';
}
function drawWings(ctx,x,y,sz,now,P){
  const isMoving=Math.hypot(P.vx||0,P.vy||0)>0.5;
  const flapSpeed=isMoving?1.8:0.8;
  const flapAmp=isMoving?0.38:0.18;
  const wPhase=now/280*flapSpeed;
  const flapL=Math.sin(wPhase)*flapAmp;           
  const flapR=Math.sin(wPhase+0.4)*flapAmp;       
  const sway=Math.sin(now/600)*4;                  
  const drawSingleWing=(side)=>{
    const sx=side>0?1:-1;
    ctx.save();ctx.translate(x+sx*sz*0.3,y+4+sway*0.3);
    ctx.rotate(sx*(Math.PI*0.22+(side>0?flapR:flapL)));
    const wg=ctx.createLinearGradient(0,0,sx*55,-35);
    wg.addColorStop(0,'rgba(220,220,255,0.85)');
    wg.addColorStop(0.5,'rgba(180,195,255,0.65)');
    wg.addColorStop(1,'rgba(140,160,240,0.25)');
    ctx.fillStyle=wg;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(sx*20,-12,sx*50,-22,sx*58,-10);
    ctx.bezierCurveTo(sx*55,2,sx*28,14,sx*12,10);
    ctx.bezierCurveTo(sx*8,8,sx*4,5,0,0);
    ctx.closePath();ctx.fill();
    for(let fi=0;fi<3;fi++){
      const frac=(fi+1)/4;
      const fa=-(fi+1)*0.12;
      ctx.save();ctx.rotate(sx*fa);
      const fg=ctx.createLinearGradient(0,0,sx*42,-28*frac);
      fg.addColorStop(0,'rgba(255,255,255,0.35)');
      fg.addColorStop(1,'rgba(200,210,255,0.0)');
      ctx.fillStyle=fg;
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.bezierCurveTo(sx*18,-9*frac,sx*38,-18*frac,sx*46-fi*4,-8*frac);
      ctx.bezierCurveTo(sx*42,0,sx*20,6*frac,0,0);
      ctx.closePath();ctx.fill();
      ctx.restore();
    }
    ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.18;
    ctx.strokeStyle='#e0e8ff';ctx.lineWidth=1.5;
    for(let fi=0;fi<4;fi++){
      const fa=fi*0.08-0.1;
      ctx.beginPath();
      ctx.moveTo(sx*12+fi*2,0);
      ctx.quadraticCurveTo(sx*(35+fi*4),-14-fi*2,sx*(50+fi*3),-6-fi);
      ctx.stroke();
    }
    ctx.restore();
    ctx.restore();
  };
  drawSingleWing(-1);
  drawSingleWing(1);
}

function slimeBlobPath(ctx,x,y,r,t,speedMag){
  const segs=12;
  const wFreq=4.5;
  const wAmp=r*(0.18+Math.min(speedMag/14,0.18));
  const tOff=t*0.008;
  ctx.beginPath();
  for(let i=0;i<=segs;i++){
    const ang=Math.PI*2/segs*i;
    const wobble=1+Math.sin(ang*wFreq+tOff)*wAmp/r
                  +Math.sin(ang*2.1+tOff*1.4)*wAmp*0.5/r;
    const rx=x+Math.cos(ang)*r*wobble;
    const ry=y+Math.sin(ang)*r*wobble;
    i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
  }
  ctx.closePath();
}

    ctx.globalCompositeOperation='lighter';ctx.globalAlpha=0.15*wraithPulse;
    ctx.strokeStyle='#4fc3f7';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(x,y,sz*1.3,0,Math.PI*2);ctx.stroke();
    ctx.restore();
    glowAt(ctx,x,y,sz*2.5,'#4fc3f7',0.2*phase);
    return;
  }
}
function drawEnemies(ctx,room){
  const now=Date.now();
  for(const e of room.enemies){
    if(e.dead)continue;
    ctx.globalAlpha=e.charmed?0.7:1;
    const _esp=e.isBoss?SPRITES.boss:SPRITES.enemies[e.id];
    if(e.flash>0){
      ctx.fillStyle='#fff';ctx.globalAlpha=0.9;
      ctx.beginPath();ctx.arc(e.x,e.y,e.sz*1.1,0,Math.PI*2);ctx.fill();
    } else if(e.id===12){
      drawEnemyAnimations(ctx,e,now);
    } else if(spr(_esp)){
      const bounce=(e.id===0||e.id===5||e.id===8)?Math.abs(Math.sin(now/120+e._seed))*4:0;
      const sway=(e.id===1||e.id===9)?Math.sin(now/180+e._seed)*3:0;
      const d=e.sz*(e.isBoss?3.2:2.8);
      ctx.save();
      if(e.id===3){
        const ps=0.95+0.05*Math.sin(now/400+e._seed);
        ctx.translate(e.x,e.y);ctx.scale(ps,ps);
        ctx.drawImage(_esp,-d/2,-d/2,d,d);
      } else if(e.id===2){
        const sq=1+0.08*Math.sin(now/80+e._seed);
        ctx.translate(e.x,e.y-bounce);ctx.scale(sq,1/sq);
        ctx.drawImage(_esp,-d/2,-d/2+bounce,d,d);
      } else {
        ctx.drawImage(_esp,e.x-d/2,e.y-d/2-bounce+sway*0.3,d,d);
      }
      ctx.restore();
      if(e.id===1)drawEnemyAnimations(ctx,e,now);
      if(e.id===9)drawEnemyAnimations(ctx,e,now);
    } else {
      drawEnemyAnimations(ctx,e,now);
    }
    if(e.charmed){
      ctx.save();ctx.globalAlpha=0.8;
      ctx.strokeStyle='#ff69b4';ctx.lineWidth=2;ctx.beginPath();ctx.arc(e.x,e.y,e.sz+4,0,Math.PI*2);ctx.stroke();
      for(let ci=0;ci<3;ci++){
        const ca=now/500+ci*Math.PI*2/3;
        const chx=e.x+Math.cos(ca)*(e.sz+10),chy=e.y+Math.sin(ca)*(e.sz+10)-Math.sin(now/300+ci)*3;
        heartPath(ctx,chx,chy,5,5);ctx.fillStyle='#ff69b4';ctx.fill();
      }
      ctx.restore();
    }
    if(e.isBoss||e.maxHp>=30){
      const bw=e.sz*2.2,bh=6;const bx=e.x-e.sz*1.1,by=e.y-e.sz-(e.isBoss?14:10);
      const hpRatio=Math.max(0,e.hp/e.maxHp);
      ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
      ctx.fillStyle='#3a0808';ctx.fillRect(bx,by,bw,bh);
      const hbg2=ctx.createLinearGradient(bx,by,bx,by+bh);
      hbg2.addColorStop(0,e.isBoss?'#ff6b6b':'#f9ca24');hbg2.addColorStop(1,e.isBoss?'#e74c3c':'#f0932b');
      ctx.fillStyle=hbg2;ctx.fillRect(bx,by,bw*hpRatio,bh);
    }
    ctx.globalAlpha=1;
  }
  drawTears(ctx,room.tears);
}

function drawHearts(ctx,P){
  const hw=10,hh=10,gap=4,sx=10,sy=8;
  const low=P.hp<=2;
  const pulse=low?0.5+0.5*Math.sin(Date.now()/180):1;
  for(let i=0;i<P.maxHp;i+=2){
    const cx=sx+(i/2)*(hw*2+gap)+hw,cy=sy+hh;
    drawHUDHeart(ctx,cx,cy,hw,hh,P.hp>i+1?2:P.hp>i?1:0,'red',pulse);
  }
  for(let i=0;i<P.soul;i+=2){
    const cx=sx+((P.maxHp/2)+i/2)*(hw*2+gap)+hw+6,cy=sy+hh;
    drawHUDHeart(ctx,cx,cy,hw,hh,P.soul>i+1?2:P.soul>i?1:0,'soul',1);
  }
}
function drawHUDHeart(ctx,cx,cy,hw,hh,fill,type,pulse=1){
  const red=type==='red';
  const emptyCol=red?'#3a0808':'#0a1a3a';
  const fullCol =red?'#e74c3c':'#85c1e9';
  const midCol  =red?'#c0392b':'#2471a3';
  ctx.save();
  if(fill===2&&pulse<1){ctx.scale(1+(1-pulse)*0.08,1+(1-pulse)*0.08);} 
  ctx.fillStyle=emptyCol;
  heartPath(ctx,cx,cy,hw,hh);ctx.fill();
  if(fill===0){ctx.restore();return;}
  ctx.save();
  if(fill===1){ctx.beginPath();ctx.rect(cx-hw-2,cy-hh-2,hw+2,hh*3);ctx.clip();}
  const g=ctx.createRadialGradient(cx-hw*0.2,cy-hh*0.3,0,cx,cy,hw*1.5);
  g.addColorStop(0,fill===2?'#ff8a8a':midCol);
  g.addColorStop(0.5,fullCol);
  g.addColorStop(1,midCol);
  ctx.fillStyle=g;
  heartPath(ctx,cx,cy,hw,hh);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.45)';
  ctx.beginPath();ctx.ellipse(cx-hw*0.25,cy-hh*0.35,hw*0.28,hh*0.18,-0.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
  if(fill===2) glowAt(ctx,cx,cy,hw*2.2,fullCol,0.22*pulse);
  ctx.restore();
}
function drawMinimap(ctx,G){
  if(!G.floorData)return;
  const mts=12,mgap=2,mx=CFG.W-80,my=CFG.HUD_H+8;
  const grid=G.floorData.grid;
  for(let gy=0;gy<CFG.GH;gy++){
    for(let gx=0;gx<CFG.GW;gx++){
      const r=grid[gy][gx];if(!r)continue;
      const rx=mx+gx*(mts+mgap),ry=my+gy*(mts+mgap);
      if(!r.visited&&!G.player?.flags?.compass){
        ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(rx,ry,mts,mts);continue;
      }
      const isHere=gx===G.roomGX&&gy===G.roomGY;
      const cols={start:'#2ecc71',normal:'#888',item:'#f39c12',treasure:'#f1c40f',shop:'#3498db',boss:'#e74c3c',secret:'#9b59b6'};
      ctx.fillStyle=isHere?'#fff':cols[r.type]||'#888';
      ctx.fillRect(rx,ry,mts,mts);
      ctx.fillStyle='rgba(0,0,0,0.5)';
      if(!r.doors.n)ctx.fillRect(rx,ry,mts,2);
      if(!r.doors.s)ctx.fillRect(rx,ry+mts-2,mts,2);
      if(!r.doors.w)ctx.fillRect(rx,ry,2,mts);
      if(!r.doors.e)ctx.fillRect(rx+mts-2,ry,2,mts);
    }
  }
}

function drawItemCodex(ctx,P,G){
  const W=CFG.W,H=CFG.H;

  ctx.fillStyle='rgba(4,2,14,0.92)';ctx.fillRect(0,0,W,H);
  const hbg=ctx.createLinearGradient(0,0,W,0);

  ctx.font=`bold 18px 'Share Tech Mono',monospace`;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillText('ITEM CODEX',W/2+1,25);
  ctx.fillStyle='#e74c3c';ctx.fillText('ITEM CODEX',W/2,24);
  ctx.font=`10px 'Share Tech Mono',monospace`;
  ctx.fillStyle='rgba(200,200,220,0.5)';
  ctx.fillText(`${P.items.length} items collected this run  ·  [I] or [ESC] to close`,W/2,42);
  const iconS=46,gap=7,cols=12;
  const gridW=cols*(iconS+gap)-gap;
  const gx0=(W-gridW)/2, gy0=56;
  P.items.forEach((id,idx)=>{
    const item=ITEM_MAP[id];if(!item)return;
    const col=idx%cols;
    const row=Math.floor(idx/cols);
    const ix=gx0+col*(iconS+gap);
    const iy=gy0+row*(iconS+gap);
    ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fillRect(ix,iy,iconS,iconS);
    ctx.strokeStyle=item.col;ctx.lineWidth=1;ctx.globalAlpha=0.5;
    ctx.strokeRect(ix,iy,iconS,iconS);ctx.globalAlpha=1;
    const _isp=SPRITES.items[id];
    if(spr(_isp)){ctx.drawImage(_isp,ix+3,iy+3,iconS-6,iconS-6);}
    else{
      ctx.fillStyle=item.col;ctx.beginPath();
      ctx.arc(ix+iconS/2,iy+iconS/2,iconS/2-7,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='rgba(255,255,255,0.55)';ctx.font=`7px 'Share Tech Mono',monospace`;
    ctx.textAlign='center';
    const shortName=item.name.length>9?item.name.slice(0,8)+'…':item.name;
    ctx.fillText(shortName,ix+iconS/2,iy+iconS+9);
  });
  if(P.items.length===0){
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.font=`12px 'Share Tech Mono',monospace`;
    ctx.textAlign='center';ctx.fillText('No items collected yet.',W/2,gy0+30);
  }
  const rows=Math.ceil(P.items.length/cols);
  const descY=gy0+rows*(iconS+gap)+18;
  const rule=ctx.createLinearGradient(gx0,descY,gx0+gridW,descY);
  rule.addColorStop(0,'rgba(231,76,60,0)');rule.addColorStop(0.5,'rgba(231,76,60,0.4)');rule.addColorStop(1,'rgba(231,76,60,0)');
  ctx.strokeStyle=rule;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(gx0,descY);ctx.lineTo(gx0+gridW,descY);ctx.stroke();
  ctx.textAlign='left';
  ctx.font=`bold 10px 'Share Tech Mono',monospace`;
  ctx.fillStyle='rgba(200,200,220,0.5)';
  ctx.fillText('ITEM EFFECTS',gx0,descY+14);
  const maxDesc=Math.floor((H-descY-40)/(22));
  P.items.slice(0,maxDesc).forEach((id,i)=>{
    const item=ITEM_MAP[id];if(!item)return;
    const iy2=descY+28+i*22;
    const _isp2=SPRITES.items[id];
    if(spr(_isp2)){ctx.drawImage(_isp2,gx0,iy2-12,18,18);}
    else{ctx.fillStyle=item.col;ctx.beginPath();ctx.arc(gx0+9,iy2-3,6,0,Math.PI*2);ctx.fill();}
    ctx.fillStyle=item.col;ctx.font=`bold 10px 'Share Tech Mono',monospace`;
    ctx.fillText(item.name,gx0+22,iy2);
    ctx.fillStyle='rgba(200,200,220,0.6)';ctx.font=`9px 'Share Tech Mono',monospace`;
    ctx.fillText('— '+item.desc,gx0+22+item.name.length*7,iy2);
  });
  if(P.items.length>maxDesc){
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font=`9px 'Share Tech Mono',monospace`;
    ctx.fillText(`+ ${P.items.length-maxDesc} more items…`,gx0,descY+28+maxDesc*22);
  }
  const pathPanelX=W*0.62,pathPanelY=descY+8;
  ctx.font=`bold 10px 'Share Tech Mono',monospace`;
  ctx.fillStyle='rgba(200,200,220,0.5)';ctx.textAlign='left';
  ctx.fillText('UPGRADE PATHS',pathPanelX,pathPanelY+6);
  if(!P.paths||P.paths.length===0){
    ctx.fillStyle='rgba(255,255,255,0.22)';ctx.font=`9px 'Share Tech Mono',monospace`;
    ctx.fillText('Pick up an item to unlock path choices.',pathPanelX,pathPanelY+24);
  } else {
    P.paths.forEach((entry,pi)=>{
      const path=UPGRADE_PATHS[entry.pathIdx];
      const py=pathPanelY+22+pi*72;
      ctx.fillStyle=path.col;ctx.font=`bold 11px 'Share Tech Mono',monospace`;
      ctx.fillText(`${path.icon}  ${path.name}`,pathPanelX,py);
      for(let li=0;li<4;li++){
        const filled=li<entry.level;
        ctx.fillStyle=filled?path.col:'rgba(255,255,255,0.12)';
        ctx.beginPath();ctx.arc(pathPanelX+W*0.2+li*18,py-5,5,0,Math.PI*2);ctx.fill();
        if(filled){glowAt(ctx,pathPanelX+W*0.2+li*18,py-5,10,path.col,0.4);}
      }
      ctx.font=`8px 'Share Tech Mono',monospace`;
      if(entry.level>0){
        const al=path.levels[entry.level-1];
        ctx.fillStyle='rgba(255,255,255,0.7)';
        ctx.fillText(`Active L${entry.level}: ${al.name}`,pathPanelX+8,py+14);
        ctx.fillStyle='rgba(200,200,200,0.45)';
        ctx.fillText(al.desc,pathPanelX+8,py+25);
      }
      if(entry.level<path.levels.length){
        const nl=path.levels[entry.level];
        ctx.fillStyle='rgba(255,255,255,0.3)';
        ctx.fillText(`Next → ${nl.name}: ${nl.desc}`,pathPanelX+8,py+40);

        ctx.fillStyle=path.col;ctx.font=`bold 8px 'Share Tech Mono',monospace`;
        ctx.fillText('FULLY ASCENDED',pathPanelX+8,py+40);
      }
    });
  }
  ctx.textAlign='left';ctx.globalAlpha=1;
}

const Unlocks={
  data:{forgottenUnlocked:false,completions:0,bestFloor:0,bestScore:0,_justUnlocked:false},
  save(){try{localStorage.setItem('tote_v1',JSON.stringify(this.data));}catch(e){}},
  load(){try{const d=localStorage.getItem('tote_v1');if(d)Object.assign(this.data,JSON.parse(d));}catch(e){}},
  unlock(key){if(!this.data[key]){this.data[key]=true;this.data._justUnlocked=true;this.save();}},
};
Unlocks.load();
let _devOpen=false;
function toggleDev(){
  _devOpen=!_devOpen;
  document.getElementById('dc').style.display=_devOpen?'block':'none';
}
document.getElementById('dci').addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const cmd=e.target.value.trim().toLowerCase();e.target.value='';
  const parts=cmd.split(' ');
  if(parts[0]==='give'&&G.player){
    const id=parseInt(parts[1]);
    if(ITEM_MAP[id]){pickupItem(G.player,id,G);console.log('Gave item',ITEM_MAP[id].name);}
  }
  if(parts[0]==='spawn'&&G.room&&G.player){
    const id=parseInt(parts[1]);
    G.room.enemies.push(createEnemy(id,G.player.x+80,G.player.y,G.floor));
  }
  if(parts[0]==='heal'&&G.player){G.player.hp=G.player.maxHp;}
  if(parts[0]==='kill'&&G.room){G.room.enemies.forEach(e=>killEnemy(e,G.room,G));}
  if(parts[0]==='goto'&&G.floorData){
    G.floor=parseInt(parts[1])||1;G.newFloor();G.setState('playing');}
});
window.addEventListener('keydown',e=>{if(e.code==='F1'){e.preventDefault();toggleDev();}});
document.getElementById('dbb').addEventListener('click',toggleDev);
let _tick=0,_fps=60,_lastTime=0,_fpsSmooth=60;
function frame(ts){
  requestAnimationFrame(frame);
  const dt=Math.min(ts-_lastTime,50);_lastTime=ts;
  _fpsSmooth=lerp(_fpsSmooth,1000/(dt||16),0.05);_fps=_fpsSmooth;
  _tick++;
  if(_devOpen&&G.player)drawDevConsole(G.player,G,_fps);
  if(G.state==='playing'||G.state==='paused'){
    if(kj('KeyI'))G._codexOpen=!G._codexOpen;
    if(G._codexOpen&&kj('Escape')){G._codexOpen=false;}
  }
  if(G.state==='menu'){
    if(kj('ArrowLeft')||kj('KeyA'))MENU_SEL.char=Math.max(0,MENU_SEL.char-1);
    if(kj('ArrowRight')||kj('KeyD'))MENU_SEL.char=Math.min(3,MENU_SEL.char+1);
    if(kj('Enter')){
      if(MENU_SEL.char===1&&!Unlocks.data.forgottenUnlocked)MENU_SEL.char=0;
      G.startRun(MENU_SEL.char);
    }
    if(kj('KeyM'))AU.toggleMusic();
    if(kj('KeyC')){CFG.CRT=!CFG.CRT;}
  }
  if(G.state==='dead'||G.state==='victory'){
    if(kj('Enter'))G.startRun(G.charId);
    if(kj('KeyQ'))G.setState('menu');
  }
  if(G.state==='playing'){
    if(kj('Escape'))G.setState('paused');
  }
  if(G.state==='paused'){
    if(kj('Escape'))G.setState('playing');
    if(kj('KeyR'))G.startRun(G.charId);
    if(kj('KeyQ'))G.setState('menu');
  }
  if(G.state==='pathMenu'&&G._pathMenu){
    if(kj('Digit1')||kj('Numpad1'))G._pathMenu.hoveredIdx=0;
    if(kj('Digit2')||kj('Numpad2'))G._pathMenu.hoveredIdx=1;
    if(kj('Digit3')||kj('Numpad3'))G._pathMenu.hoveredIdx=2;
    if(kj('Enter')||kj('Space')){
      choosePath(G.player,G._pathMenu.paths[G._pathMenu.hoveredIdx]);
      G._pathMenu=null;
      G.state=G._prevState||'playing';
    }
  }
  if(G.state==='playing'){
    if(G._transitioning){
      G._transProgress+=8;
      if(G._transProgress>=CFG.W||G._transProgress>=CFG.H){
        const nr=G._nextRoom;
        G.roomGX=nr.gx;G.roomGY=nr.gy;G.room=nr.room;
        enterRoom(G,nr.room,nr.enterDir);
        G._transitioning=false;G._transProgress=0;G._nextRoom=null;
      }
    } else if(G._bossIntro>0){
      G._bossIntro--;
    } else {
      const P=G.player;const room=G.room;
      if(P&&room){
        updatePlayer(P,G);
        room.enemies.forEach(e=>{if(!e.dead)updateEnemy(e,P,room,G);});
        updateTears(room.tears,P,room,G,true);
        const boss=room.enemies.find(e=>e.isBoss&&e.dead);
        if(boss&&!room._bossDefeated){
          room._bossDefeated=true;
          AU.levelup();
          if(G.floor>=6){
            Unlocks.data.completions=(Unlocks.data.completions||0)+1;
            Unlocks.data.bestScore=Math.max(Unlocks.data.bestScore||0,P.score);
            Unlocks.data._justUnlocked=false;
            if(!Unlocks.data.forgottenUnlocked){Unlocks.data.forgottenUnlocked=true;Unlocks.data._justUnlocked=true;}
            Unlocks.save();
            setTimeout(()=>{G.setState('victory');AU.victory();},2000);
          } else {
            room.pickups.push({x:boss.x,y:boss.y,type:'stair',r:20,dead:false,col:'#2ecc71'});
          }
        }
        if(room._bossDefeated&&!room._floorAdvanced){
          room.pickups.filter(pk=>pk.type==='stair'&&!pk.dead).forEach(pk=>{
            if(Vec2.dist({x:P.x,y:P.y},{x:pk.x,y:pk.y})<P.sz+pk.r){
              pk.dead=true;room._floorAdvanced=true;
              P.hp=Math.min(P.maxHp,P.hp+2); 
              G.floor++;G.newFloor();AU.startMusic(G.floor);
              addShake(12);
            }
          });
        }
        if(boss&&room._bossDefeated&&P.flags.redemption&&!room._redemptionDone){
          room._redemptionDone=true;
          room.pickups.push(makePedestal(P.x+80,P.y));
        }
      }
    }
    updateParts();updateFlashRings();updateStompWarnings();
    if(G._itemPopup&&G._itemPopup.timer>0)G._itemPopup.timer--;
    SHAKE.mag*=0.85;
  }
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  ctx.setLineDash([]);ctx.filter='none';
  ctx.save();
  try {
  if(G.state==='playing'&&SHAKE.mag>0.5){
    ctx.translate(Math.round((Math.random()-0.5)*SHAKE.mag),Math.round((Math.random()-0.5)*SHAKE.mag));
  }
  if(G.state==='menu'){
    drawMainMenu(ctx,_tick,Unlocks.data);
  } else if(G.state==='playing'||G.state==='paused'){
    ctx.fillStyle='#000';ctx.fillRect(0,0,CFG.W,CFG.H);
    if(G.room){
      if(G._transitioning&&G._nextRoom){
        const prog=G._transProgress;
        const offsets={n:{x:0,y:prog},s:{x:0,y:-prog},w:{x:prog,y:0},e:{x:-prog,y:0}};
        const off=offsets[G._transDir]||{x:0,y:0};
        ctx.save();ctx.translate(off.x,off.y);
        drawRoom(ctx,G.room,G.floor);
        drawPickups(ctx,G.room,G);
        if(G.player)drawTears(ctx,G.player.tears);
        drawEnemies(ctx,G.room);
        if(G.player)drawPlayer(ctx,G.player);
        drawStompWarnings(ctx);drawParts(ctx);drawFlashRings(ctx);
        ctx.restore();
        const opp={n:{x:0,y:prog-CFG.H},s:{x:0,y:-(prog-CFG.H)},w:{x:prog-CFG.W,y:0},e:{x:-(prog-CFG.W),y:0}};
        const noff=opp[G._transDir]||{x:0,y:0};
        ctx.save();ctx.translate(noff.x,noff.y);
        drawRoom(ctx,G._nextRoom.room,G.floor);ctx.restore();
      } else {
        drawRoom(ctx,G.room,G.floor);
        drawPickups(ctx,G.room,G);
        if(G.player)drawTears(ctx,G.player.tears);
        drawEnemies(ctx,G.room);
        if(G.player)drawPlayer(ctx,G.player);
        drawStompWarnings(ctx);drawParts(ctx);drawFlashRings(ctx);
      }
    }
    if(G.player)drawHUD(ctx,G.player,G);
    drawMinimap(ctx,G);
    if(G._bossIntro>0)drawBossIntro(ctx,G);
    if(CFG.CRT)drawCRT(ctx);
    if(G.state==='paused')drawPauseMenu(ctx,G.player);
    if(G.state==='pathMenu'&&G._pathMenu)drawPathMenu(ctx,G);
  } else if(G.state==='pathMenu'){
    if(G.room){
      ctx.fillStyle='#000';ctx.fillRect(0,0,CFG.W,CFG.H);
      drawRoom(ctx,G.room,G.floor);
      drawPickups(ctx,G.room,G);
      if(G.player){drawTears(ctx,G.player.tears);drawPlayer(ctx,G.player);}
      drawEnemies(ctx,G.room);
    }
    if(G.player)drawHUD(ctx,G.player,G);
    if(G._pathMenu)drawPathMenu(ctx,G);
  } else if(G.state==='dead'){
    drawDeathScreen(ctx,G,_tick);
  } else if(G.state==='victory'){
    drawVictoryScreen(ctx,G,_tick,Unlocks.data);
  }
  if(G._codexOpen&&G.player)drawItemCodex(ctx,G.player,G);
  } finally {
    ctx.restore();
  }
}
const DLC_REPENTANCE_ECHO={
  id:'repentance_echo',name:'Repentance Echo',
  register(G){
    console.log('[DLC] Repentance Echo pack registered');
  },
};
DLC_REPENTANCE_ECHO.register(G);
for(let i=0;i<200;i++)spawnParts(0,0,1,{life:0});
requestAnimationFrame(frame);
console.log('%cTEARS OF THE ETERNAL v1.0','color:#e74c3c;font-size:18px;font-weight:bold');
console.log('Press F1 for dev console. Items: '+ITEM_DB.length+'. Enemy types: '+ENEMY_DB.length);</script>
